apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recruiter-feedback
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Mohan-codeX/recruiter-feedback.git
    targetRevision: main
    path: helm/recruiter-feedback

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true